# Nginx Configuration for Port 80/8080 Architecture
# This configuration separates Laravel API (8080) from Flussonic Streaming (80)

# ============================================================
# PORT 80 - FLUSSONIC STREAMING (Handled by Flussonic directly)
# ============================================================
# No Nginx needed on port 80 - Flussonic serves directly
# Streams available at: http://server/stream/index.m3u8

# ============================================================
# PORT 8080 - LARAVEL API & ADMIN
# ============================================================

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    
    server_name _;
    root /var/www/mediaserver/public;
    index index.php;
    client_max_body_size 2100M;

    # Logging
    access_log /var/log/nginx/mediaserver_access.log;
    error_log /var/log/nginx/mediaserver_error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # CORS Headers for API
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Main routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Buffer settings for large responses
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Timeout for long-running operations
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
    }

    # Static files - Cache them
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security - Hide dot files
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

